async function api(body){const r=await fetch('/api/calendar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});let d={};try{d=await r.json()}catch(e){}if(!r.ok)throw new Error(d.error||('서버 오류 '+r.status));return d}
async function run(){
  const btn=document.getElementById('btn');btn.disabled=true;
  try{
    setStatus('기존 일정 확인 중...');
    const data=await api({action:'list',range:{start:'2026-07-01',end:'2026-09-11'}});
    const existing=new Set((data.slots||[]).map(s=>s.date+'|'+s.time+'|'+s.teacher));
    const todo=SLOTS.filter(s=>!existing.has(s.date+'|'+s.time+'|'+s.teacher));
    const skipped=SLOTS.length-todo.length;
    if(!todo.length){setStatus('모든 일정이 이미 등록되어 있습니다. (건너뜀 '+skipped+'개)');setBar(100);return}
    let done=0;
    for(let i=0;i<todo.length;i+=BATCH){
      const batch=todo.slice(i,i+BATCH);
      setStatus('등록 중... '+done+' / '+todo.length+(skipped?' (이미 있어서 건너뜀 '+skipped+'개)':''));
      const r=await api({action:'bulkCreate',slots:batch});
      done+=r.created||batch.length;
      setBar(Math.round(done/todo.length*100));
    }
    setBar(100);
    setStatus('완료! '+done+'개 등록'+(skipped?', '+skipped+'개는 이미 있어서 건너뜀':'')+'\n이제 메인 화면에서 확인해보세요.');
  }catch(err){
    setStatus('오류: '+err.message+'\n다시 실행하면 등록 안 된 것만 이어서 등록됩니다.');
    btn.disabled=false;
  }
}
</script>
</body></html>
