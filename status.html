<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>예약 현황 - 강선구</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f8fafc;color:#0f172a;min-height:100vh;padding:24px}
.wrap{max-width:920px;margin:0 auto}
.head{margin-bottom:16px}
.head .date-range{color:#64748b;font-size:13px}
.head h1{margin:4px 0 0;font-size:26px}
.viewonly{display:inline-block;background:#eef2ff;color:#3730a3;font-size:12px;font-weight:700;padding:4px 10px;border-radius:999px;margin-top:8px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:22px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.calendar-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.calendar-head h2{margin:0;font-size:20px}
.calendar-head button{padding:8px 14px;font-size:14px;border-radius:10px;border:1px solid #d1d5db;background:#fff;color:#475569;cursor:pointer}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;font-size:12.5px;align-items:center}
.legend .chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-weight:600}
.legend .hint{color:#94a3b8;font-size:12px}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.dow{text-align:center;font-size:12px;font-weight:700;color:#94a3b8;padding:4px 0}
.day{min-height:96px;border:1px solid #eef2f6;border-radius:10px;padding:6px;background:#fff}
.day.out{background:#fafafa;opacity:.5}
.date-num{font-size:13px;font-weight:700;margin-bottom:4px}
.entry{display:block;font-size:11.5px;line-height:1.25;padding:3px 6px;border-radius:8px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;border-left:4px solid transparent}
.entry.online{border-left-color:#2563eb;background:#dbeafe;color:#1e40af}
.entry.offline{border-left-color:#ea580c;background:#ffedd5;color:#9a3412}
.entry.plain{background:#fee2e2;color:#991b1b}
.more{display:block;font-size:11px;color:#64748b;margin-top:3px;font-weight:700}
.status{font-size:12.5px;color:#94a3b8;margin-top:14px;text-align:center}
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal-bg.hidden{display:none}
.modal{background:#fff;border-radius:18px;padding:22px;max-width:420px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,.15)}
.modal h3{margin:0 0 4px;font-size:18px}
.modal .msub{font-size:13px;color:#64748b;margin:0 0 14px}
.modal .row{padding:10px 12px;border:1px solid #e5e7eb;border-radius:10px;margin-bottom:6px}
.modal .row .w{font-size:14px;font-weight:700}
.modal .row .m{font-size:12.5px;color:#475569;margin-top:3px}
.modal .row .m.empty{color:#cbd5e1}
.modal .close{margin-top:8px;width:100%;padding:12px;border:none;border-radius:12px;background:#111827;color:#fff;font-weight:700;font-size:15px;cursor:pointer}
.mtag{display:inline-block;font-size:11px;font-weight:700;padding:1px 7px;border-radius:6px;margin-left:6px;vertical-align:middle}
.mtag.online{background:#dbeafe;color:#1e40af}.mtag.offline{background:#ffedd5;color:#9a3412}
@media(max-width:720px){.day{min-height:70px;padding:4px}.entry{font-size:10px;padding:2px 4px}.date-num{font-size:12px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="date-range">2026.07.01 ~ 2026.09.11</div>
    <h1>📋 강선구 선생님 예약 현황</h1>
    <span class="viewonly">조회 전용</span>
  </div>
  <div class="card">
    <div class="calendar-head">
      <button onclick="changeMonth(-1)">이전</button>
      <h2 id="monthTitle"></h2>
      <button onclick="changeMonth(1)">다음</button>
    </div>
    <div class="legend">
      <span class="chip" style="background:#dbeafe;color:#1e40af">▎비대면</span>
      <span class="chip" style="background:#ffedd5;color:#9a3412">▎대면</span>
      <span class="hint">예약 완료된 상담만 표시</span>
    </div>
    <div class="calendar" id="calendar"></div>
    <div class="status" id="status">불러오는 중...</div>
  </div>
</div>
<div id="dayModal" class="modal-bg hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="dmTitle"></h3>
    <p class="msub" id="dmSub"></p>
    <div id="dmList"></div>
    <button class="close" onclick="closeModal()">닫기</button>
  </div>
</div>
<script>
const TEACHER = '강선구';
const RANGE = { start: '2026-07-01', end: '2026-09-11' };
let currentMonth = 6, currentYear = 2026;
let slots = [];
function pad(n){return String(n).padStart(2,'0')}
function ymd(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function formatDate(s){const d=new Date(s+'T00:00:00');const w=['일','월','화','수','목','금','토'][d.getDay()];return d.getFullYear()+'.'+pad(d.getMonth()+1)+'.'+pad(d.getDate())+'('+w+')'}
function isInRange(d){return d>=RANGE.start&&d<=RANGE.end}
async function load(){
  try{
    const res=await fetch('/api/calendar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'list',range:RANGE})});
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||('서버 오류 '+res.status));
    slots=(data.slots||[]).filter(s=>s.teacher===TEACHER && s.booked);
    document.getElementById('status').innerText='Google Calendar 기준 · 예약 '+slots.length+'건';
  }catch(err){
    document.getElementById('status').innerText='불러오기 실패: '+err.message;
  }
  renderCalendar();
}
function changeMonth(delta){currentMonth+=delta;if(currentMonth<0){currentMonth=11;currentYear--}if(currentMonth>11){currentMonth=0;currentYear++}renderCalendar()}
function modeClass(m){return m==='온라인'?'online':(m==='대면'?'offline':'plain')}
function renderCalendar(){
  const cal=document.getElementById('calendar');
  document.getElementById('monthTitle').innerText=currentYear+'년 '+(currentMonth+1)+'월';
  let html=['일','월','화','수','목','금','토'].map(d=>'<div class="dow">'+d+'</div>').join('');
  const first=new Date(currentYear,currentMonth,1);
  const start=new Date(currentYear,currentMonth,1-first.getDay());
  const MAX=3;
  for(let i=0;i<42;i++){
    const d=new Date(start);d.setDate(start.getDate()+i);
    const dateStr=ymd(d);const inMonth=d.getMonth()===currentMonth;
    const day=slots.filter(s=>s.date===dateStr).sort((a,b)=>a.time.localeCompare(b.time));
    const shown=day.slice(0,MAX);const extra=day.length-shown.length;
    const entries=shown.map(s=>'<span class="entry '+modeClass(s.mode)+'">'+s.time+' '+(s.memo? s.memo.split(' / ')[0].replace(/^(학생: )/,'') : (s.mode||'예약'))+'</span>').join('')+(extra>0?'<span class="more" onclick="openDay(\''+dateStr+'\')">+'+extra+'건 더보기</span>':'');
    const click=day.length?(' onclick="openDay(\''+dateStr+'\')" style="cursor:pointer"'):'';
    html+='<div class="day '+(inMonth&&isInRange(dateStr)?'':'out')+'"'+click+'><div class="date-num">'+d.getDate()+'</div>'+entries+'</div>';
  }
  cal.innerHTML=html;
}
function openDay(dateStr){
  const day=slots.filter(s=>s.date===dateStr).sort((a,b)=>a.time.localeCompare(b.time));
  if(!day.length)return;
  document.getElementById('dmTitle').innerText=formatDate(dateStr);
  document.getElementById('dmSub').innerText='예약 '+day.length+'건';
  document.getElementById('dmList').innerHTML=day.map(s=>{
    const mt=s.mode?'<span class="mtag '+(s.mode==='온라인'?'online':'offline')+'">'+s.mode+'</span>':'';
    return '<div class="row"><div class="w">'+s.time+mt+'</div>'+(s.memo?'<div class="m">📝 '+s.memo+'</div>':'<div class="m empty">메모 없음</div>')+'</div>';
  }).join('');
  document.getElementById('dayModal').classList.remove('hidden');
}
function closeModal(){document.getElementById('dayModal').classList.add('hidden')}
load();
</script>
</body></html>
